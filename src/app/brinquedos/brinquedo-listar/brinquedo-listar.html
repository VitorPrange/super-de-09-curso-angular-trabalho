<h1>Brinquedos</h1>

<span>
    Quantidade de brinquedos:
    <strong>{{ brinquedos().length }}</strong>
</span>

<table>
    <thead>
        <tr>
            <th>Modelo</th>
            <th>Marca</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th></th>
        </tr>
    </thead>

    <tbody>

        @for(brinquedo of brinquedos(); track brinquedo.id){

            <tr>
                <td>{{ brinquedo.modelo }}</td>
                <td>{{ brinquedo.marca }}</td>
                <td>R$ {{ brinquedo.preco }}</td>
                <td>{{ brinquedo.quantidade }}</td>
                <td>
                    <button routerLink="/brinquedos-brinquedo-editar/{{brinquedo.id}}">Editar</button>
                    <button (click)="apagar(brinquedo.id!)">Excluir</button>
            </tr>

        }

    </tbody>
</table>
